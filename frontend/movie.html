<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie – Cinestream</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Cinestream</a>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="Search movies...">
      <button onclick="doSearch()">Search</button>
    </div>
    <button class="mobile-search-btn" onclick="toggleMobileSearch()" aria-label="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <div class="nav-links" id="navLinks"></div>
  </nav>
  <div class="mobile-search-bar" id="mobileSearchBar">
    <input type="text" id="mobileSearchInput" placeholder="Search movies...">
    <button onclick="doMobileSearch()">Search</button>
  </div>

  <main>
    <!-- MOVIE DETAILS -->
    <div class="movie-details-top" id="movieDetails">
      <p class="loading" style="grid-column:1/-1">Loading movie...</p>
    </div>

    <hr class="section-divider">

    <!-- REVIEWS -->
    <div id="reviewsSection">
      <div class="reviews-header">
        <h2>Reviews</h2>
      </div>

      <!-- Write a review (only shown when logged in and hasn't reviewed yet) -->
      <div class="review-form-box" id="reviewFormBox" style="display:none">
        <h3>Write a Review</h3>
        <div class="rating-row">
          <label>Rating</label>
          <div class="star-picker" id="starPicker">
            <span data-val="1">&#9733;</span>
            <span data-val="2">&#9733;</span>
            <span data-val="3">&#9733;</span>
            <span data-val="4">&#9733;</span>
            <span data-val="5">&#9733;</span>
          </div>
        </div>
        <div class="form-group">
          <textarea id="reviewComment" placeholder="Share your thoughts about this movie..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="submitReview()">Post Review</button>
      </div>

      <div id="reviewsList"></div>
    </div>

    <hr class="section-divider">

    <!-- MORE LIKE THIS -->
    <div id="recommendationsSection">
      <h2 class="section-title">More Like <span>This</span></h2>
      <div class="horizontal-scroll" id="recommendationsList">
        <p class="loading">Loading recommendations...</p>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/movie.js"></script>

</body>
</html>
